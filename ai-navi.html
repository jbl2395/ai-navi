<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI NAVI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Share Tech Mono',monospace;}

  /* ===== 全体コンテナ ===== */
  #app{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:#000;
  }

  /* 星空なし・真っ黒背景 */

  /* ===== タイトル ===== */
  #title-wrap{
    position:relative;z-index:10;
    text-align:center;
    margin-bottom:24px;
    opacity:0;
    transform:translateY(-16px);
    transition:opacity 1.2s ease, transform 1.2s ease;
  }
  #title-wrap.visible{opacity:1;transform:translateY(0);}

  #title-main{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:clamp(14px,4.8vw,28px);
    letter-spacing:0.22em;
    color:#fff;
    white-space:nowrap;
    text-shadow:
      0 0 12px rgba(0,200,255,1),
      0 0 30px rgba(0,160,255,0.7),
      0 0 60px rgba(0,120,255,0.4);
    position:relative;
  }
  /* スキャンライン風装飾 */
  #title-main::before,#title-main::after{
    content:'';position:absolute;
    left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,200,255,0.6),transparent);
  }
  #title-main::before{top:-8px;}
  #title-main::after{bottom:-8px;}

  #title-sub{
    margin-top:10px;
    font-size:clamp(10px,3vw,15px);
    letter-spacing:0.4em;
    color:rgba(0,200,255,0.8);
    text-transform:uppercase;
  }

  /* ===== 地球儀キャンバス ===== */
  #globe-wrap{
    position:relative;z-index:5;
    width:min(60vw,60vh);
    height:min(60vw,60vh);
    flex-shrink:0;
  }
  #globe-canvas{
    width:100%;height:100%;
    display:block;
    border-radius:50%;
    /* 外周グロー */
    filter:drop-shadow(0 0 30px rgba(0,150,255,0.5)) drop-shadow(0 0 60px rgba(0,100,255,0.3));
  }

  /* 赤道リング装飾 */
  #globe-ring{
    position:absolute;inset:-6px;
    border-radius:50%;
    border:1px solid rgba(0,200,255,0.25);
    pointer-events:none;
    animation:ringPulse 3s ease-in-out infinite;
  }
  #globe-ring2{
    position:absolute;inset:-14px;
    border-radius:50%;
    border:1px solid rgba(0,200,255,0.1);
    pointer-events:none;
    animation:ringPulse 3s ease-in-out infinite 1s;
  }
  @keyframes ringPulse{
    0%,100%{opacity:0.4;transform:scale(1);}
    50%{opacity:0.9;transform:scale(1.01);}
  }

  /* ===== 入力エリア ===== */
  #input-area{
    position:relative;z-index:10;
    width:min(92vw,420px);
    margin-top:28px;
    opacity:0;
    transform:translateY(20px);
    transition:opacity 0.8s ease, transform 0.8s ease;
    pointer-events:none;
  }
  #input-area.visible{opacity:1;transform:translateY(0);pointer-events:all;}

  #input-label{
    text-align:center;
    font-size:clamp(12px,3.2vw,16px);
    color:rgba(255,255,255,0.85);
    letter-spacing:0.15em;
    margin-bottom:14px;
    font-family:'Orbitron',sans-serif;
    font-weight:400;
  }

  #input-box{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(0,200,255,0.35);
    border-radius:12px;
    padding:12px 14px;
    gap:10px;
    box-shadow:0 0 20px rgba(0,150,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    transition:border-color 0.3s, box-shadow 0.3s;
  }
  #input-box:focus-within{
    border-color:rgba(0,200,255,0.7);
    box-shadow:0 0 30px rgba(0,150,255,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  #dest-input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    font-size:16px;
    color:#fff;
    font-family:'Share Tech Mono',monospace;
    letter-spacing:0.05em;
  }
  #dest-input::placeholder{color:rgba(255,255,255,0.3);}

  /* マイクボタン */
  #mic-btn{
    width:42px;height:42px;
    border-radius:50%;
    background:rgba(0,180,255,0.18);
    border:1.5px solid rgba(0,200,255,0.5);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;cursor:pointer;
    transition:all 0.2s;
    touch-action:manipulation;
  }
  #mic-btn:active{transform:scale(0.9);}
  #mic-btn.listening{
    background:rgba(255,50,50,0.3);
    border-color:rgba(255,100,100,0.8);
    animation:micGlow 1s ease-in-out infinite;
  }
  @keyframes micGlow{
    0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,0.4);}
    50%{box-shadow:0 0 0 10px rgba(255,80,80,0);}
  }
  #mic-btn svg{width:20px;height:20px;}

  /* 送信ボタン */
  #send-btn{
    width:42px;height:42px;
    border-radius:50%;
    background:rgba(0,180,255,0.25);
    border:1.5px solid rgba(0,200,255,0.6);
    display:none;
    align-items:center;justify-content:center;
    flex-shrink:0;cursor:pointer;
    transition:all 0.2s;
    touch-action:manipulation;
  }
  #send-btn.show{display:flex;}
  #send-btn:active{transform:scale(0.9);}
  #send-btn svg{width:18px;height:18px;}

  /* ===== 音声認識インジケーター ===== */
  #voice-overlay{
    position:fixed;inset:0;z-index:100;
    background:rgba(0,0,10,0.7);
    display:none;flex-direction:column;
    align-items:center;justify-content:center;
    gap:20px;
    backdrop-filter:blur(6px);
  }
  #voice-overlay.on{display:flex;}
  .voice-waves{display:flex;align-items:center;gap:6px;height:48px;}
  .vw{width:5px;border-radius:3px;background:rgba(0,200,255,0.9);animation:wv 0.8s ease-in-out infinite;}
  .vw:nth-child(1){height:14px;animation-delay:0s;}
  .vw:nth-child(2){height:28px;animation-delay:0.1s;}
  .vw:nth-child(3){height:42px;animation-delay:0.2s;}
  .vw:nth-child(4){height:32px;animation-delay:0.3s;}
  .vw:nth-child(5){height:18px;animation-delay:0.4s;}
  @keyframes wv{0%,100%{transform:scaleY(1);opacity:1;}50%{transform:scaleY(0.3);opacity:0.5;}}
  #voice-txt{
    font-family:'Orbitron',sans-serif;
    font-size:14px;letter-spacing:0.2em;
    color:rgba(0,200,255,0.9);
  }
  #voice-cancel{
    font-size:12px;color:rgba(255,255,255,0.5);
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:8px;padding:8px 20px;cursor:pointer;
    font-family:'Share Tech Mono',monospace;
    touch-action:manipulation;
  }

  /* ===== ステータステキスト ===== */
  #status{
    position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
    left:0;right:0;text-align:center;
    font-size:11px;letter-spacing:0.2em;
    color:rgba(0,200,255,0.45);
    z-index:10;
    font-family:'Share Tech Mono',monospace;
  }

  /* ===== 回転アニメーション後の演出用 ===== */
  #zoom-overlay{
    position:fixed;inset:0;z-index:50;
    background:radial-gradient(ellipse at center, transparent 30%, #000 100%);
    pointer-events:none;
    opacity:0;
    transition:opacity 0.5s;
  }
</style>
</head>
<body>


<div id="app">
  <!-- タイトル -->
  <div id="title-wrap">
    <div id="title-main">AI NAVIGATION SYSTEM</div>
    <div id="title-sub">POWERED BY GEMINI</div>
  </div>

  <!-- 地球儀 -->
  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="globe-ring"></div>
    <div id="globe-ring2"></div>
  </div>

  <!-- 入力エリア -->
  <div id="input-area">
    <div id="input-label">どこへ行きますか？</div>
    <div id="input-box">
      <input id="dest-input" type="text" placeholder="目的地を入力..." autocomplete="off"
        oninput="onInput()" onkeydown="onKey(event)">
      <button id="send-btn" onclick="onSubmit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,200,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
      <button id="mic-btn" onclick="toggleMic()">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,200,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- 音声認識オーバーレイ -->
<div id="voice-overlay">
  <div class="voice-waves">
    <div class="vw"></div><div class="vw"></div><div class="vw"></div>
    <div class="vw"></div><div class="vw"></div>
  </div>
  <div id="voice-txt">LISTENING...</div>
  <button id="voice-cancel" onclick="stopMic()">キャンセル</button>
</div>

<div id="status">SYSTEM READY</div>
<div id="zoom-overlay"></div>

<script>
// ============================================================
// WebGL 地球儀
// ============================================================
var globe=(function(){
  var canvas=document.getElementById('globe-canvas');
  var gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
  if(!gl)return null;

  var SIZE=512;
  canvas.width=SIZE;canvas.height=SIZE;

  var VS=`
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main(){v_uv=a_pos*0.5+0.5;gl_Position=vec4(a_pos,0,1);}
  `;
  var FS=`
    precision mediump float;
    varying vec2 v_uv;
    uniform float u_rot;
    uniform float u_time;
    uniform float u_fade;
    uniform float u_targetRot;
    uniform float u_zoomPow;

    float hash(vec2 p){
      p=fract(p*vec2(127.1,311.7));
      p+=dot(p,p+19.19);
      return fract(p.x*p.y);
    }
    float noise(vec2 p){
      vec2 i=floor(p),f=fract(p);
      vec2 u=f*f*(3.0-2.0*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
    }
    float fbm(vec2 p){
      float v=0.0,a=0.5;
      for(int i=0;i<5;i++){v+=noise(p)*a;p*=2.1;a*=0.5;}
      return v;
    }

    // 陸地マスク（シンプルなノイズベース）
    float landMask(vec2 uv){
      float f=fbm(uv*3.5+vec2(1.7,0.9));
      float f2=fbm(uv*6.0+vec2(3.1,2.3));
      float mask=smoothstep(0.47,0.52,f+f2*0.18);

      // 極地は白（氷）
      float lat=abs(uv.y-0.5)*2.0;
      float polar=smoothstep(0.82,0.95,lat);

      return max(mask,polar);
    }

    void main(){
      vec2 dc=(v_uv-0.5)*2.0;
      float dist=length(dc);

      // 地球の外は透明（背景の黒がそのまま見える）
      if(dist>1.04){
        gl_FragColor=vec4(0.0,0.0,0.0,0.0);
        return;
      }

      // 大気リム
      if(dist>1.0){
        float rim=1.0-(dist-1.0)/0.04;
        rim=pow(clamp(rim,0.0,1.0),1.5);
        vec3 atmCol=mix(vec3(0.15,0.45,0.9),vec3(0.4,0.75,1.0),rim);
        gl_FragColor=vec4(atmCol,rim*0.85*u_fade);
        return;
      }

      // 球面計算
      vec2 sph=dc;
      float z=sqrt(max(0.0,1.0-dot(sph,sph)));
      vec3 n=normalize(vec3(sph.x,sph.y,z));

      float lat=atan(n.y,length(n.xz));
      float lon=atan(n.x,n.z)+u_rot;

      float u=fract(lon/6.2832+0.5);
      float v=1.0-(lat/3.14159+0.5);

      // 陸地/海
      float land=landMask(vec2(u,v));
      float polar=smoothstep(0.82,0.95,abs(v-0.5)*2.0);

      vec3 oceanCol=vec3(0.04,0.12,0.38);
      vec3 landCol=vec3(0.08,0.22,0.55);
      vec3 polarCol=vec3(0.75,0.88,1.0);

      // 深海・浅瀬グラデーション（より鮮やかな青）
      float oceanDepth=fbm(vec2(u,v)*4.0+vec2(2.1,1.3));
      oceanCol=mix(vec3(0.02,0.08,0.45),vec3(0.05,0.25,0.75),oceanDepth*0.8);

      // 大陸も青みがかった色調
      float terrain=fbm(vec2(u,v)*8.0+vec2(5.1,3.7))*0.3+0.7;
      landCol=mix(vec3(0.06,0.18,0.48),vec3(0.12,0.32,0.65),terrain);

      vec3 col=mix(oceanCol,landCol,land);
      col=mix(col,polarCol,polar);

      // 雲レイヤ（少し青白く）
      float cloud=fbm(vec2(u+u_time*0.004,v)*5.5+vec2(1.1,2.2));
      cloud=smoothstep(0.52,0.68,cloud);
      col=mix(col,vec3(0.80,0.90,1.0),cloud*0.70);

      // ライティング（左上から）
      vec3 light=normalize(vec3(-0.6,0.5,0.8));
      float diff=clamp(dot(n,light),0.0,1.0);
      float amb=0.25;
      col*=(amb+diff*(1.0-amb));

      // 地球縁のリム光（青く輝く）
      float rim=pow(1.0-z,4.0);
      col+=vec3(0.05,0.20,0.55)*rim*0.8;

      // 夜側の街明かり（青白く）
      float nightFactor=clamp(-dot(n,light)*2.0,0.0,1.0);
      float city=fbm(vec2(u,v)*12.0)*0.5;
      city=step(0.62,city)*land;
      col+=vec3(0.5,0.7,1.0)*city*nightFactor*0.5;

      gl_FragColor=vec4(col,u_fade);
    }
  `;

  function mkShader(type,src){
    var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
    return s;
  }
  var vs=mkShader(gl.VERTEX_SHADER,VS),fs=mkShader(gl.FRAGMENT_SHADER,FS);
  if(!vs||!fs)return null;
  var prog=gl.createProgram();
  gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
  gl.useProgram(prog);

  var buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  var ap=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(ap);
  gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  var uRot=gl.getUniformLocation(prog,'u_rot');
  var uTime=gl.getUniformLocation(prog,'u_time');
  var uFade=gl.getUniformLocation(prog,'u_fade');

  var rotY=0,targetRot=0,spinning=true;
  var startTime=performance.now();
  var fadeIn=0;

  function render(){
    var t=(performance.now()-startTime)/1000;
    fadeIn=Math.min(1,t/1.5);

    if(spinning){rotY+=0.004;}
    else{
      // ターゲットへ滑らかに回転
      var diff=targetRot-rotY;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      rotY+=diff*0.03;
    }

    gl.viewport(0,0,SIZE,SIZE);
    gl.clearColor(0,0,0,0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform1f(uRot,rotY);
    gl.uniform1f(uTime,t);
    gl.uniform1f(uFade,fadeIn);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  return{
    rotateToTarget:function(lonDeg){
      // 経度を目的地の方向へ（正面に持ってくる）
      targetRot=lonDeg*Math.PI/180;
      spinning=false;
    },
    startSpin:function(){spinning=true;}
  };
})();

// ============================================================
// オープニング シーケンス
// ============================================================
window.addEventListener('load',function(){
  // 0.4秒後にタイトル表示
  setTimeout(function(){
    document.getElementById('title-wrap').classList.add('visible');
  },400);

  // 0.8秒後に入力エリア表示
  setTimeout(function(){
    document.getElementById('input-area').classList.add('visible');
    document.getElementById('status').textContent='ENTER DESTINATION';
  },1400);
});

// ============================================================
// 入力処理
// ============================================================
function onInput(){
  var val=document.getElementById('dest-input').value.trim();
  document.getElementById('send-btn').classList.toggle('show',val.length>0);
}
function onKey(e){
  if(e.key==='Enter')onSubmit();
}
function onSubmit(){
  var val=document.getElementById('dest-input').value.trim();
  if(!val)return;
  handleDestination(val);
}

// ============================================================
// 目的地処理
// ============================================================
function handleDestination(dest){
  document.getElementById('status').textContent='NAVIGATING TO: '+dest.toUpperCase();
  document.getElementById('dest-input').blur();

  // 地球儀を目的地方向へ回転（デモ：固定座標）
  // 実際はGeocoding APIで経度を取得する
  var demoLon=135.5; // 和歌山あたり
  if(globe)globe.rotateToTarget(demoLon);

  // 2秒後にズームイン演出（今後 Earth Studio動画と接続）
  setTimeout(function(){
    startZoomIn(dest);
  },2200);
}

// ============================================================
// ズームイン演出（フェーズ2への橋渡し）
// ============================================================
function startZoomIn(dest){
  document.getElementById('status').textContent='ZOOMING IN...';

  // 地球儀を拡大しながらフェードアウト → 次フェーズへ
  var globeWrap=document.getElementById('globe-wrap');
  var overlay=document.getElementById('zoom-overlay');
  var inputArea=document.getElementById('input-area');
  var titleWrap=document.getElementById('title-wrap');

  // 入力エリア・タイトルをフェードアウト
  inputArea.style.transition='opacity 0.5s';inputArea.style.opacity='0';
  titleWrap.style.transition='opacity 0.5s';titleWrap.style.opacity='0';

  // 地球儀を拡大
  globeWrap.style.transition='transform 1.8s cubic-bezier(0.4,0,0.2,1)';
  globeWrap.style.transform='scale(4)';

  // オーバーレイをフェードイン（画面を黒に）
  overlay.style.transition='opacity 1.2s ease 0.8s';
  overlay.style.opacity='1';

  // フェードアウト後にメッセージ表示（フェーズ2/3の接続点）
  setTimeout(function(){
    document.getElementById('status').innerHTML=
      '[ '+dest.toUpperCase()+' ] — ROUTE CALCULATION IN PROGRESS';
    // ここにフェーズ2（Earth Studio動画 or Maps API）を接続予定
  },2200);
}

// ============================================================
// 音声認識
// ============================================================
var recog=null,isListening=false;

function toggleMic(){
  if(isListening){stopMic();}
  else{startMic();}
}

function startMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('このブラウザは音声認識に対応していません');return;}
  if(!recog){
    recog=new SR();
    recog.lang='ja-JP';
    recog.continuous=false;
    recog.interimResults=false;
    recog.onresult=function(e){
      var txt=e.results[0][0].transcript;
      stopMicUI();
      document.getElementById('dest-input').value=txt;
      onInput();
      setTimeout(function(){onSubmit();},400);
    };
    recog.onerror=function(e){stopMicUI();};
    recog.onend=function(){stopMicUI();};
  }
  isListening=true;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('voice-overlay').classList.add('on');
  try{recog.start();}catch(e){stopMicUI();}
}

function stopMic(){
  if(recog)try{recog.abort();}catch(e){}
  stopMicUI();
}
function stopMicUI(){
  isListening=false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('voice-overlay').classList.remove('on');
}
</script>
</body>
</html>
